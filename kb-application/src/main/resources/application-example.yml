# ================================
# 知识库配置示例
# ================================

# 是否启用知识库功能
knowledge.base.enabled=true

# 默认存储类型：ES, DATABASE, BOTH
knowledge.base.default-storage-type=ES

# ================================
# ES 配置
# ================================
knowledge.base.elasticsearch.enabled=true
knowledge.base.elasticsearch.hosts=127.0.0.1:9200
knowledge.base.elasticsearch.username=elastic
knowledge.base.elasticsearch.password=your_password
knowledge.base.elasticsearch.index-prefix=kb_
knowledge.base.elasticsearch.connection-timeout=5000
knowledge.base.elasticsearch.socket-timeout=60000
knowledge.base.elasticsearch.max-conn-total=100
knowledge.base.elasticsearch.max-conn-per-route=20
# 分词器类型：IK_MAX_WORD(细粒度), IK_SMART(粗粒度), STANDARD, WHITESPACE
knowledge.base.elasticsearch.analyzer=IK_MAX_WORD

# ================================
# 数据库配置
# ================================
knowledge.base.database.enabled=true
knowledge.base.database.type=mysql
knowledge.base.database.driver-class-name=com.mysql.cj.jdbc.Driver
knowledge.base.database.url=jdbc:mysql://localhost:3306/knowledge_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
knowledge.base.database.username=root
knowledge.base.database.password=your_password
knowledge.base.database.minimum-idle=5
knowledge.base.database.maximum-pool-size=20
knowledge.base.database.connection-timeout=30000
knowledge.base.database.idle-timeout=600000
knowledge.base.database.max-lifetime=1800000
knowledge.base.database.table-prefix=kb_
knowledge.base.database.show-sql=false
