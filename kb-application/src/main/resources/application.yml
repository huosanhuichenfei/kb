# ==================== 数据源配置 ====================
spring:
  ai:
    ollama:
      # 内网 Ollama 服务地址（根据实际 IP 和端口修改）
      base-url: http://122.51.140.219:11434
      embedding:
        enabled: true
        options:
          # 使用你拉取的模型名称
          model: nomic-embed-text
      # 重要：禁止应用启动时自动从外网拉取模型
      init:
        pull-model-strategy: never
  datasource:
    url: jdbc:postgresql://122.51.140.219:5432/knowledge_db?currentSchema=public&ssl=false
    username: wangyl
    password: Wcdma,123456
    driver-class-name: org.postgresql.Driver
    # HikariCP 专属配置（以 hikari 为前缀）
    hikari:
      maximum-pool-size: 10          # 最大连接数，默认 10
      minimum-idle: 5                # 最小空闲连接数，默认与 maximum-pool-size 相同
      connection-timeout: 30000      # 连接超时（毫秒），默认 30 秒
      idle-timeout: 600000           # 空闲连接存活时间（毫秒），默认 10 分钟
      max-lifetime: 1800000          # 连接最长生命周期（毫秒），默认 30 分钟
      connection-test-query: SELECT 1
      pool-name: MyHikariCP          # 连接池名称，方便监控

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true          # 下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # SQL 日志输出到控制台
  global-config:
    db-config:
      id-type: auto                             # 主键策略
      logic-delete-field: deleted               # 逻辑删除字段
      logic-delete-value: 1                     # 已删除值
      logic-not-delete-value: 0                 # 未删除值
  type-handlers-package: com.knowledge.base.handler  # TypeHandler 包路径
  mapper-locations: classpath:/mapper/**/*.xml       # Mapper XML 文件位置

# ==================== 服务器配置 ====================
server:
  port: 8080